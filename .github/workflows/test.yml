name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install and verify
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        python -c "import eegtopo; print(f'eegtopo version: {eegtopo.__version__}')"
